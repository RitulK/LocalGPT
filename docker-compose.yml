services:
  # Ollama service - runs LLM models locally
  ollama:
    image: ollama/ollama:latest
    container_name: localgpt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - localgpt-network
    # Uncomment below if you have NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Backend service - FastAPI server
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: localgpt-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    volumes:
      - ./backend:/app
    networks:
      - localgpt-network

  # Frontend service - React + Vite
  frontend:
    build:
      context: .
      dockerfile: frontend.dockerfile
    container_name: localgpt-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - localgpt-network

volumes:
  ollama_data:
    driver: local

networks:
  localgpt-network:
    driver: bridge
