services:
  # Backend service - FastAPI server
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: localgpt-backend
    ports:
      - "8000:8000"
    environment:
      # Use native Ollama on the macOS host so it can use Apple Metal acceleration.
      - OLLAMA_HOST=http://host.docker.internal:11434
    restart: unless-stopped
    volumes:
      - ./backend:/app
    networks:
      - localgpt-network

  # Frontend service - React + Vite
  frontend:
    build:
      context: .
      dockerfile: frontend.dockerfile
    container_name: localgpt-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - localgpt-network

networks:
  localgpt-network:
    driver: bridge
